name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: .buildozer_cache
          key: buildozer-docker-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: buildozer-docker-${{ runner.os }}-

      - name: Build APK with Kivy Docker image
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v ${{ github.workspace }}/.buildozer_cache:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "APK not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rfid-check-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
