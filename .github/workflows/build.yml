name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip wget \
            build-essential ccache \
            libssl-dev libffi-dev python3-dev \
            zlib1g-dev autoconf automake libtool \
            pkg-config cmake

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install "cython==0.29.37"
          pip install "buildozer==1.2.0"
          pip install "python-for-android==2022.3.13"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r23b and platform
        run: |
          echo "y" | sdkmanager "ndk;23.1.7779620" "platforms;android-31" "build-tools;31.0.0" --sdk_root=$ANDROID_SDK_ROOT

      - name: Prepare buildozer dirs and symlinks
        run: |
          # buildozer가 사용할 경로 생성 (runner 홈 디렉터리 = /home/runner)
          mkdir -p $HOME/.buildozer/android/platform

          # SDK/NDK를 buildozer가 기대하는 경로로 심볼릭 링크
          ln -sfn $ANDROID_SDK_ROOT \
            $HOME/.buildozer/android/platform/android-sdk

          NDK_PATH="$ANDROID_SDK_ROOT/ndk/23.1.7779620"
          ln -sfn $NDK_PATH \
            $HOME/.buildozer/android/platform/android-ndk-r23b

          echo "BUILDOZER_HOME=$HOME/.buildozer" >> $GITHUB_ENV
          echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV

          # 경로 확인
          ls $HOME/.buildozer/android/platform/

      - name: Cache p4a build
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILDOZER_HOME }}/android/platform/build-arm64-v8a
          key: p4a-build-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v7
          restore-keys: p4a-build-${{ runner.os }}-

      - name: Build APK
        env:
          ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
          ANDROIDNDK: ${{ env.NDK_PATH }}
          ANDROIDAPI: "31"
          NDKAPI:     "26"
        run: |
          buildozer -v android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rfid-check-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
