name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential ccache \
            libssl-dev libffi-dev python3-dev \
            zlib1g-dev autoconf automake libtool \
            pkg-config cmake

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install "cython==0.29.37"
          pip install "buildozer==1.2.0"
          pip install "python-for-android==2022.3.13"

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v5
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rfid-check-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
